<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 260" font-family="sans-serif" font-size="13">
  <!-- boxes -->
  <rect x="20" y="40" width="140" height="55" rx="6" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="90" y="62" text-anchor="middle" font-weight="bold">ユーザー</text>
  <text x="90" y="80" text-anchor="middle">ログイン</text>

  <rect x="210" y="40" width="140" height="55" rx="6" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="280" y="62" text-anchor="middle" font-weight="bold">ブラウザで</text>
  <text x="280" y="80" text-anchor="middle">アクセス</text>

  <rect x="400" y="40" width="140" height="55" rx="6" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="470" y="62" text-anchor="middle" font-weight="bold">質問を入力</text>
  <text x="470" y="80" text-anchor="middle">テキスト / 画像</text>

  <rect x="590" y="40" width="160" height="55" rx="6" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="670" y="62" text-anchor="middle" font-weight="bold">AIが回答を生成</text>
  <text x="670" y="80" text-anchor="middle">ストリーミング表示</text>

  <!-- arrows -->
  <line x1="160" y1="67" x2="208" y2="67" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="350" y1="67" x2="398" y2="67" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="540" y1="67" x2="588" y2="67" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- RAG branch -->
  <line x1="470" y1="95" x2="470" y2="135" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="370" y="138" width="200" height="100" rx="6" fill="none" stroke="#000" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="470" y="163" text-anchor="middle" font-weight="bold">RAG 利用時</text>
  <text x="470" y="185" text-anchor="middle">社内文書をベクトル検索</text>
  <text x="470" y="207" text-anchor="middle">→ 関連情報を回答に反映</text>
  <text x="470" y="228" text-anchor="middle" font-size="11">（pgvector）</text>

  <!-- arrowhead marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#000"/>
    </marker>
  </defs>
</svg>
