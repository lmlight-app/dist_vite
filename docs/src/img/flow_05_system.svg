<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="sans-serif" font-size="13">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#000"/>
    </marker>
  </defs>

  <!-- outer box -->
  <rect x="10" y="10" width="700" height="330" rx="8" fill="none" stroke="#000" stroke-width="2"/>
  <text x="360" y="38" text-anchor="middle" font-size="15" font-weight="bold">お客様の環境（オンプレミス）</text>

  <!-- Web UI -->
  <rect x="40" y="60" width="180" height="70" rx="6" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="130" y="85" text-anchor="middle" font-weight="bold">Web UI</text>
  <text x="130" y="105" text-anchor="middle" font-size="11">ブラウザ（:8000）</text>
  <text x="130" y="120" text-anchor="middle" font-size="11">Vite + React 19</text>

  <!-- API Server -->
  <rect x="310" y="60" width="200" height="70" rx="6" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="410" y="85" text-anchor="middle" font-weight="bold">API Server</text>
  <text x="410" y="105" text-anchor="middle" font-size="11">FastAPI（Python）:8000</text>
  <text x="410" y="120" text-anchor="middle" font-size="11">REST API + WebSocket</text>

  <!-- arrow: WebUI -> API -->
  <line x1="220" y1="95" x2="308" y2="95" stroke="#000" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="264" y="88" text-anchor="middle" font-size="10">REST API</text>

  <!-- vertical line from API -->
  <line x1="410" y1="130" x2="410" y2="170" stroke="#000" stroke-width="1.5"/>

  <!-- horizontal spread -->
  <line x1="130" y1="170" x2="640" y2="170" stroke="#000" stroke-width="1"/>

  <!-- down arrows -->
  <line x1="130" y1="170" x2="130" y2="195" stroke="#000" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="360" y1="170" x2="360" y2="195" stroke="#000" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="590" y1="170" x2="590" y2="195" stroke="#000" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- PostgreSQL -->
  <rect x="40" y="198" width="180" height="70" rx="6" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="130" y="223" text-anchor="middle" font-weight="bold">PostgreSQL</text>
  <text x="130" y="243" text-anchor="middle" font-size="11">+ pgvector（:5432）</text>
  <text x="130" y="258" text-anchor="middle" font-size="11">データ + ベクトル検索</text>

  <!-- LLM -->
  <rect x="270" y="198" width="180" height="70" rx="6" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="360" y="223" text-anchor="middle" font-weight="bold">ローカルLLM</text>
  <text x="360" y="243" text-anchor="middle" font-size="11">Ollama（:11434）</text>
  <text x="360" y="258" text-anchor="middle" font-size="11">or vLLM（:8080）</text>

  <!-- Pipeline -->
  <rect x="500" y="198" width="180" height="70" rx="6" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="590" y="223" text-anchor="middle" font-weight="bold">パイプラインエンジン</text>
  <text x="590" y="243" text-anchor="middle" font-size="11">19オペレーター</text>
  <text x="590" y="258" text-anchor="middle" font-size="11">+ スケジューラ</text>

  <!-- note -->
  <text x="360" y="310" text-anchor="middle" font-size="11">※ すべてのデータはお客様環境内に保存されます</text>
  <text x="360" y="328" text-anchor="middle" font-size="11">※ クラウドLLM（OpenAI / Anthropic / Google）はオプション（管理者が有効化した場合のみ）</text>
</svg>
