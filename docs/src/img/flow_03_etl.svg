<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 180" font-family="sans-serif" font-size="13">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#000"/>
    </marker>
  </defs>

  <!-- box 1 -->
  <rect x="10" y="30" width="140" height="80" rx="6" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="80" y="55" text-anchor="middle" font-weight="bold">データソース</text>
  <text x="80" y="75" text-anchor="middle" font-size="11">CSV / Excel</text>
  <text x="80" y="91" text-anchor="middle" font-size="11">DB / API / RSS</text>

  <!-- box 2 -->
  <rect x="190" y="30" width="140" height="80" rx="6" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="260" y="55" text-anchor="middle" font-weight="bold">取り込み</text>
  <text x="260" y="75" text-anchor="middle" font-size="11">ファイル読込</text>
  <text x="260" y="91" text-anchor="middle" font-size="11">DB / API 読込</text>

  <!-- box 3 -->
  <rect x="370" y="30" width="140" height="80" rx="6" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="440" y="55" text-anchor="middle" font-weight="bold">変換・加工</text>
  <text x="440" y="75" text-anchor="middle" font-size="11">フィルター / AI変換</text>
  <text x="440" y="91" text-anchor="middle" font-size="11">集計 / マージ</text>

  <!-- box 4 -->
  <rect x="550" y="30" width="140" height="80" rx="6" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="620" y="55" text-anchor="middle" font-weight="bold">出力先</text>
  <text x="620" y="75" text-anchor="middle" font-size="11">DB格納 / ファイル</text>
  <text x="620" y="91" text-anchor="middle" font-size="11">API送信 / メール</text>

  <!-- box 5 -->
  <rect x="730" y="30" width="120" height="80" rx="6" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="790" y="55" text-anchor="middle" font-weight="bold">スケジュール</text>
  <text x="790" y="75" text-anchor="middle" font-size="11">定期自動実行</text>
  <text x="790" y="91" text-anchor="middle" font-size="11">cron設定</text>

  <!-- arrows -->
  <line x1="150" y1="70" x2="188" y2="70" stroke="#000" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="330" y1="70" x2="368" y2="70" stroke="#000" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="510" y1="70" x2="548" y2="70" stroke="#000" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="690" y1="70" x2="728" y2="70" stroke="#000" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- label -->
  <text x="430" y="150" text-anchor="middle" font-size="11">※ ビジュアルキャンバス上でドラッグ&amp;ドロップで構築（19種オペレーター）</text>
</svg>
