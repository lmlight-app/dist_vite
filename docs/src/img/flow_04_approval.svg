<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 220" font-family="sans-serif" font-size="13">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#000"/>
    </marker>
  </defs>

  <!-- box 1 -->
  <rect x="20" y="40" width="140" height="55" rx="6" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="90" y="62" text-anchor="middle" font-weight="bold">申請者</text>
  <text x="90" y="80" text-anchor="middle" font-size="11">申請を作成</text>

  <!-- box 2 -->
  <rect x="210" y="40" width="140" height="55" rx="6" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="280" y="62" text-anchor="middle" font-weight="bold">申請内容</text>
  <text x="280" y="80" text-anchor="middle" font-size="11">ファイル添付</text>

  <!-- box 3 -->
  <rect x="400" y="40" width="140" height="55" rx="6" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="470" y="62" text-anchor="middle" font-weight="bold">承認者に通知</text>
  <text x="470" y="80" text-anchor="middle" font-size="11">メール / Webhook</text>

  <!-- box 4 -->
  <rect x="590" y="40" width="160" height="55" rx="6" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="670" y="62" text-anchor="middle" font-weight="bold">承認 / 却下</text>
  <text x="670" y="80" text-anchor="middle" font-size="11">コメント付き</text>

  <!-- arrows -->
  <line x1="160" y1="67" x2="208" y2="67" stroke="#000" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="350" y1="67" x2="398" y2="67" stroke="#000" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="540" y1="67" x2="588" y2="67" stroke="#000" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Webhook branch -->
  <line x1="670" y1="95" x2="670" y2="130" stroke="#000" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="590" y="133" width="160" height="55" rx="6" fill="none" stroke="#000" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="670" y="158" text-anchor="middle" font-weight="bold">Webhook</text>
  <text x="670" y="176" text-anchor="middle" font-size="11">外部サービスに通知</text>

  <!-- multi-step label -->
  <text x="470" y="135" text-anchor="middle" font-size="11">※ 多段階承認に対応（承認→次の承認者→…→最終承認）</text>
</svg>
